<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Registrera</title>

<style>
body{
  font-family: Arial;
  background:#0f1115;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1b1f27;
  padding:30px;
  border-radius:14px;
  width:320px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h1>Registrera</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Lösenord">

  <button onclick="register()">Skapa konto</button>
</div>

<script>
const API_URL = "http://127.0.0.1:3000/api/register";

async function register() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.message);
    return;
  }

  alert("Konto skapat!");

  window.location.href = "login.html";
}
</script>

</body>
</html>
